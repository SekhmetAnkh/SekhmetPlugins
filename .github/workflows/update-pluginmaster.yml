name: Update PluginMaster

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-pluginmaster
  push:
    branches:
      - main
    paths:
      - plugins.json
      - .github/workflows/update-pluginmaster.yml
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-pluginmaster:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update pluginmaster
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/Update-PluginMaster.ps1

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pluginmaster.json
          if (git diff --cached --quiet) {
            Write-Host "pluginmaster.json is already up to date."
            exit 0
          }

          git commit -m "Update pluginmaster"
          git push
